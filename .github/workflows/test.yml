name: Test Create Issue on Failure

on:
  push:
    branches:
      - main

permissions:
  issues: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Step A
        if: always()
        run: exit 1

      - name: Step B
        if: always()
        run: echo "Step B passed"

      - name: Step C
        if: always()
        run: exit 1

      - if: failure()
        uses: DmitriyLewen/create-issue-on-failure@44c6edce42bb11b8e809ae95f239efb746f2ab0c
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
