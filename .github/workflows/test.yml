name: Test Create Issue on Failure

on:
  push:
    branches:
      - main

permissions:
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Failing step
        run: exit 1

      - if: failure()
        uses: DmitriyLewen/create-issue-on-failure@f8289d984be5fc1e9cce70543376fe742e9fdc38
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
