name: Test Create Issue on Failure

on:
  push:
    branches:
      - main

permissions:
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Failing step
        run: exit 1

      - if: failure()
        uses: DmitriyLewen/create-issue-on-failure@18ad60f4cbf79e09bfc1670c5e5f74d4033f44e2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
