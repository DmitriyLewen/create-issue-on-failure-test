name: Test Create Issue on Failure

on:
  push:
    branches:
      - main

permissions:
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Failing step
        run: exit 1

      - if: failure()
        uses: DmitriyLewen/create-issue-on-failure@226fe37244de4097488a52ddfeb7a27938d33a88
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
